platforms:
  web:
    executor: "PlaywrightExecutor"
    default_config:
      browser: "chromium"
      headless: true
      viewport_width: 1920
      viewport_height: 1080
      timeout_seconds: 30

  h5:
    executor: "PlaywrightExecutor"
    default_config:
      browser: "chromium"
      headless: true
      viewport_width: 375
      viewport_height: 812
      is_mobile: true
      timeout_seconds: 30

  ios:
    executor: "IOSExecutor"
    default_config:
      platform_name: "iOS"
      automation_name: "XCUITest"
      platform_version: "17.0"
      device_name: "iPhone 15"
      timeout_seconds: 60

  android:
    executor: "AndroidExecutor"
    default_config:
      platform_name: "Android"
      automation_name: "UIAutomator2"
      platform_version: "14.0"
      timeout_seconds: 60

  miniprogram:
    executor: "MiniProgramExecutor"
    default_config:
      automation_tool: "minium"
      timeout_seconds: 60

  api:
    executor: "APIExecutor"
    default_config:
      timeout_seconds: 30
      verify_ssl: true
