providers:
  deepseek:
    api_base: "https://api.deepseek.com/v1"
    api_key_env: "DEEPSEEK_API_KEY"
    models:
      - name: "deepseek-v4-pro" 
        cost_per_1k_input: 0.00014
        cost_per_1k_output: 0.00028
        capabilities: ["high_complexity", "json_mode", "large_context"]
      - name: "deepseek-v4-flash"
        cost_per_1k_input: 0.00007
        cost_per_1k_output: 0.00014
        capabilities: ["medium_complexity", "json_mode"]

  openai:
    api_base: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    models:
      - name: "gpt-4o"
        cost_per_1k_input: 0.00250
        cost_per_1k_output: 0.01000
        capabilities: ["high_complexity", "json_mode", "vision", "large_context"]
      - name: "gpt-4o-mini"
        cost_per_1k_input: 0.00015
        cost_per_1k_output: 0.00060
        capabilities: ["medium_complexity", "json_mode"]

  anthropic:
    api_base: "https://api.anthropic.com/v1"
    api_key_env: "ANTHROPIC_API_KEY"
    models:
      - name: "claude-sonnet-4-20250514"
        cost_per_1k_input: 0.00300
        cost_per_1k_output: 0.01500
        capabilities: ["high_complexity", "vision", "large_context", "long_output"]

  # 用户百炼/MaaS 工作空间（安全检测 Vision）
  dashscope_maas:
    api_base: "https://llm-sxdmm4m4ac9z11on.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"
    api_key_env: "DASHSCOPE_API_KEY"
    models:
      - name: "qwen3-vl-plus"
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        capabilities: ["high_complexity", "json_mode", "vision", "large_context"]
      - name: "qwen3.6-plus"
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
        capabilities: ["high_complexity", "json_mode", "vision", "large_context"]

router:
  default_provider: "deepseek"
  default_model: "deepseek-v4-pro"

  rules:
    - id: "execution_security_check_vision"
      priority: 0
      description: "Login security captcha uses MaaS Qwen vision"
      conditions:
        - when: {task_tag: ["execution.security_check"]}
          route: {provider: "dashscope_maas", model: "qwen3-vl-plus"}

    - id: "task_complexity_routing"
      priority: 1
      description: "Route based on task complexity tag"
      conditions:
        - when: {task_tag: ["ingestion"]}
          route: {provider: "deepseek", model: "deepseek-v4-flash"}
        - when: {task_tag: ["parsing"]}
          route: {provider: "deepseek", model: "deepseek-v4-flash"}
        - when: {task_tag: ["analysis"], complexity: "high"}
          route: {provider: "deepseek", model: "deepseek-v4-pro"}
        - when: {task_tag: ["generation"], complexity: "high"}
          route: {provider: "deepseek", model: "deepseek-v4-pro"}
        - when: {task_tag: ["failure_reasoning"]}
          route: {provider: "deepseek", model: "deepseek-v4-flash"}
        - when: {task_tag: ["regression_selection"]}
          route: {provider: "deepseek", model: "deepseek-v4-flash"}

    - id: "budget_enforcement"
      priority: 2
      description: "Downgrade to cheaper model when budget is low"
      conditions:
        - when: {budget_remaining_pct: "<20"}
          action:
            downgrade: true
            fallback_provider: "deepseek"
            fallback_model: "deepseek-v4-flash"

    - id: "failover"
      priority: 3
      description: "Fail over to next cheapest capable provider"
      conditions:
        - when: {primary_failed: true}
          action:
            retry_count: 2
            strategy: "next_cheapest_capable"
