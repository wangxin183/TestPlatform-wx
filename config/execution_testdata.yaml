login:
  # 首次点「我的」常自动弹出登录半屏；若未弹出再点页面内登录入口
  auto_popup_on_mine_tab: true
  # 安全检测（点选图）非每次出现；出现时用千问 Vision 自动点选
  security_check_timeout_seconds: 120
  security_check_solver: qwen_maas
  security_check_model: "qwen3-vl-plus"
  security_check_max_attempts: 3
  # 拉起 App 后等待离开闪屏的最长时间
  app_ready_timeout_seconds: 30
  success_activity_substr: "ComicsMainActivity"
  login_activity_substr: "LiteAccountActivity"
  security_activity_substr: "PWebViewActivity"
  # nameTv 文案含这些字样 → 未登录（未登录页也有 avatar_view）
  guest_name_markers:
    - "戳我登录"
    - "点击登录"
    - "请登录"
    - "立即登录"
    - "登录/注册"
