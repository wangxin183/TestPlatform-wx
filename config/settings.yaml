app:
  name: "TestPlatform"
  version: "0.1.0"
  debug: true
  # secret_key is now set via SECRET_KEY environment variable

server:
  host: "0.0.0.0"
  port: 8999
  cors_origins: ["*"]

database:
  url: "sqlite+aiosqlite:///storage/test_platform.db"
  echo_sql: false

redis:
  url: "redis://localhost:6379/0"

celery:
  broker_url: "redis://localhost:6379/1"
  result_backend: "redis://localhost:6379/2"
  task_track_started: true

storage:
  root: "storage"
  documents_dir: "storage/documents"
  screenshots_dir: "storage/screenshots"
  reports_dir: "storage/reports"

logs:
  dir: "logs"
  level: "INFO"
  rotation: "10 MB"
  retention: "30 days"

llm:
  default_provider: "deepseek"
  per_pipeline_budget_usd: 3.0
  max_retries: 2
  request_timeout_seconds: 120

pipeline:
  max_retries_per_case: 3
  execution_timeout_minutes: 60

visual:
  enabled: true
  ocr_language: "chi_sim+eng"
  tesseract_cmd: "tesseract"
  comparison_threshold: 0.95
  save_diff_images: true
  diff_images_dir: "storage/screenshots/diffs"

# ────────────────────────────────────────────────────────────────
# 知识库（自包含语义 RAG，不依赖 Obsidian 桌面端）
# ────────────────────────────────────────────────────────────────
knowledge_base:
  enabled: true
  vault_path: "/Users/xiguawang/Documents/Codex/2026-06-15/iphone/obsidian_vault"
  buglist_path: "data/ACN_buglist.xlsx"
  index_db_path: "storage/knowbase_index.sqlite3"
  # embedding: openai | local_hash
  # openai 需 OPENAI_API_KEY；不可用时自动降级到 local_hash
  embedding_provider: "openai"
  embedding_model: "text-embedding-3-small"
  embedding_api_base: "https://api.openai.com/v1"
  embedding_api_key_env: "OPENAI_API_KEY"
  top_k: 8
  min_score: 0.22
  max_block_chars: 1200
  max_context_chars: 8000
  # embedding/索引不可用时降级关键词加载
  keyword_fallback: true

# ────────────────────────────────────────────────────────────────
# 独立用例生成（UI 测试点 → 用例）：组批与并发
# ────────────────────────────────────────────────────────────────
testcase_generation:
  max_tps_per_batch: 12          # 单批 TP 硬上限（防输出截断）
  target_input_tokens: 7000      # 单批输入 token 预算（含精简指令）
  max_concurrency: 3             # 批次数有限并发
  fixed_overhead_tokens: 800     # 精简指令等固定开销估算

# ────────────────────────────────────────────────────────────────
# 独立需求分析：测试点分批与上下文窗口预算
# ────────────────────────────────────────────────────────────────
requirement_analysis:
  fr_tp_batch_size: 4            # FR → TP 单批条数
  nfr_tp_batch_size: 6           # NFR → TP 单批条数
  model_context_window: 180000   # 上下文上限（约 90% of 200K）
  output_token_budget: 20000     # 预留给模型输出
  safety_margin: 5000            # 安全余量

# ────────────────────────────────────────────────────────────────
# 统一智能体运行时（面向软件测试全流程）
#   业务代码只面向 role（两段式命名 <domain>.<role>），
#   智能体选型与 fallback 顺序完全由本段配置驱动。
#   接入新阶段步骤见 docs/agent_runtime.md。
# ────────────────────────────────────────────────────────────────
agent_runtime:
  enabled: true
  strict_startup_check: false   # 本地调试建议 false；生产建议 true 以 fail-fast

  # ── Role → backend 路由链 ──
  roles:
    # 本次落地：需求分析模块
    requirement.analyzer:
      primary: cursor
      fallbacks: [claude_code, codex]
      default_timeout_seconds: 600
    requirement.reviewer:
      primary: codex
      fallbacks: [cursor, claude_code]
      default_timeout_seconds: 300
    requirement.testpoint_designer:
      primary: cursor
      fallbacks: [claude_code, codex]
      default_timeout_seconds: 600

    # 独立用例生成模块（UI 测试点 → 测试用例）
    testcase.generator:
      primary: cursor
      fallbacks: [claude_code, codex]
      default_timeout_seconds: 600
    # 编译结果为 failed / agent_required 时即时诊断（原因/建议/需补充）
    testcase.compile_advisor:
      primary: cursor
      fallbacks: [claude_code, codex]
      default_timeout_seconds: 90

    # 通用角色（跨阶段复用，自愈流程使用）
    utility.diagnoser:
      primary: cursor
      fallbacks: [claude_code, codex]
      default_timeout_seconds: 180

    # 独立测试执行运行时（execution_runtime）
    # 编译层：NL 用例 → 可执行 DSL
    execution.compiler:
      primary: cursor
      fallbacks: [claude_code, codex]
      default_timeout_seconds: 300
    # 战役级自愈诊断（StageAgentHarness / HealLoop）
    execution.diagnoser:
      primary: cursor
      fallbacks: [claude_code, codex]
      default_timeout_seconds: 120
    # DSL 缺失或定位漂移时：基于页面观察选择单个白名单 Appium 工具
    execution.navigator:
      primary: cursor
      fallbacks: [claude_code, codex]
      default_timeout_seconds: 120

    # 未来阶段（本次不实现，取消注释即接入）
    # testcase.reviewer:
    #   primary: codex
    #   fallbacks: [cursor, claude_code]
    #   default_timeout_seconds: 300
    # execution.planner:
    #   primary: cursor
    #   fallbacks: [claude_code]
    #   default_timeout_seconds: 300
    # defect.analyzer:
    #   primary: claude_code
    #   fallbacks: [cursor, codex]
    #   default_timeout_seconds: 300
    # regression.selector:
    #   primary: codex
    #   fallbacks: [claude_code]
    #   default_timeout_seconds: 180

  # ── Backend 定义 ──
  backends:
    claude_code:
      type: cli
      command: ["claude", "-p", "{prompt}"]
      stdin_prompt: false
      default_timeout_seconds: 600
    codex:
      type: cli
      command: ["codex", "exec", "--skip-git-repo-check"]
      stdin_prompt: true
      default_timeout_seconds: 300
    cursor:
      type: sdk
      mode: local              # local | cloud（本次仅实现 local）
      model: composer-2.5
      api_key_env: CURSOR_API_KEY
      default_timeout_seconds: 600
