{% extends "base.html" %}
{% block title %}执行监控 - TestPlatform{% endblock %}
{% block content %}
<div class="content-header">
  <div>
    <div class="breadcrumb"><a href="/projects">项目管理</a> <span>/</span> <span>执行监控</span></div>
    <h1>执行 #<span id="execution-id-display">-</span></h1>
  </div>
</div>
<div class="content-body fade-in">
  <div class="card-grid" id="execution-stats"></div>
  <div class="card mt-md">
    <h3 style="margin-bottom:12px">进度</h3>
    <div class="progress-bar"><div class="progress-fill success" id="progress-bar" style="width:0%"></div></div>
    <div class="flex-between mt-sm"><span id="progress-text">0/0</span><span id="pass-rate-text">-</span></div>
  </div>
  <div class="card mt-md">
    <h3 style="margin-bottom:12px">用例执行结果</h3>
    <div class="table-wrap"><table><thead><tr><th>用例</th><th>尝试</th><th>状态</th><th>耗时</th><th>失败原因</th></tr></thead>
    <tbody id="execution-results"><tr><td colspan="5" class="text-muted">加载中...</td></tr></tbody></table></div>
  </div>
  <div class="card mt-md" id="defects-section" style="display:none">
    <h3 style="margin-bottom:12px">🐛 自动发现缺陷</h3>
    <div class="table-wrap"><table><thead><tr><th>缺陷标题</th><th>严重程度</th><th>状态</th><th>关联用例</th><th>创建时间</th></tr></thead>
    <tbody></tbody></table></div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/executions.js?v=1"></script>
{% endblock %}
