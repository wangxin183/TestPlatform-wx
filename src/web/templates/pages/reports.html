{% extends "base.html" %}
{% block title %}测试报告 - TestPlatform{% endblock %}
{% block content %}
<div class="page-header">
  <h2>📄 测试报告</h2>
  <div class="page-actions">
    <button class="btn btn-primary" onclick="generateReport()">🔄 生成新报告</button>
  </div>
</div>

<div id="report-list" class="card-list">
  <p class="loading-text">加载中...</p>
</div>

<!-- Report Preview Modal -->
<div id="preview-modal" class="modal" style="display:none;">
  <div class="modal-overlay" onclick="closePreview()"></div>
  <div class="modal-content modal-lg">
    <div class="modal-header">
      <span>报告预览</span>
      <button class="btn-close" onclick="closePreview()">✕</button>
    </div>
    <div class="modal-body">
      <iframe id="preview-frame" style="width:100%; height:70vh; border:none;"></iframe>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const PROJECT_ID = window.location.pathname.split('/')[2];

async function loadReports() {
  const container = document.getElementById('report-list');
  try {
    const resp = await api.get(`/projects/${PROJECT_ID}/reports`);
    if (!resp.data || resp.data.length === 0) {
      container.innerHTML = '<div class="empty-state">暂无报告，点击"生成新报告"创建第一份报告</div>';
      return;
    }
    container.innerHTML = resp.data.map(r => `
      <div class="card-item">
        <div class="card-info">
          <span class="card-title">📊 ${r.report_type === 'execution' ? '执行报告' : r.report_type}</span>
          <span class="card-meta">格式: ${r.format.toUpperCase()}</span>
          <span class="card-meta">生成时间: ${fmt.date(r.generated_at)}</span>
          ${r.summary_json ? `<span class="card-meta">通过率: ${r.summary_json.pass_rate || 0}% | 用例数: ${r.summary_json.total_cases || 0}</span>` : ''}
        </div>
        <div class="card-actions">
          <button class="btn btn-sm" onclick="viewReport('${r.id}')">👁️ 预览</button>
          <button class="btn btn-sm" onclick="downloadReport('${r.id}')">⬇️ 下载</button>
        </div>
      </div>
    `).join('');
  } catch (e) {
    container.innerHTML = `<div class="error-state">加载失败: ${e.message}</div>`;
  }
}

function viewReport(reportId) {
  document.getElementById('preview-frame').src = `/api/v1/reports/${reportId}/view`;
  document.getElementById('preview-modal').style.display = 'flex';
}

function closePreview() {
  document.getElementById('preview-modal').style.display = 'none';
  document.getElementById('preview-frame').src = '';
}

function downloadReport(reportId) {
  window.open(`/api/v1/reports/${reportId}/download`, '_blank');
}

async function generateReport() {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '生成中...';
  try {
    const resp = await api.post(`/projects/${PROJECT_ID}/reports/generate`, {});
    alert(`报告已生成！`);
    loadReports();
  } catch(e) {
    alert(`生成失败: ${e.message}`);
  } finally {
    btn.disabled = false;
    btn.textContent = '🔄 生成新报告';
  }
}

loadReports();
</script>
{% endblock %}
