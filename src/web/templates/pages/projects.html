{% extends "base.html" %}
{% block title %}项目管理 - TestPlatform{% endblock %}
{% block head_extra %}{% endblock %}
{% block content %}

<div class="rv-page">
  <header class="rv-header">
    <div class="rv-header-left">
      <div class="rv-header-icon-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div>
        <h1 class="rv-header-title">项目管理</h1>
        <p class="rv-header-sub">创建和管理测试项目，配置平台与文档</p>
      </div>
    </div>
    <button class="rv-btn rv-btn-accent" onclick="openCreateModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      新建项目
    </button>
  </header>

  <div class="rv-page-body">
    <!-- Search + Table Card -->
    <div class="rv-card">
      <div class="rv-toolbar">
        <div class="rv-search-wrap" style="width: 320px;">
          <svg class="rv-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="rv-search-input" placeholder="搜索项目名称..." id="project-search" oninput="applySearch()" style="width:100%">
        </div>
        <span class="rv-selected-count" id="project-count">0 个项目</span>
      </div>
      <div class="rv-table-wrap">
        <table class="rv-table rv-table--nosticky">
          <colgroup>
            <col style="width:26%">
            <col style="width:38%">
            <col style="width:12%">
            <col style="width:12%">
            <col style="width:12%">
          </colgroup>
          <thead><tr>
            <th>项目名称</th>
            <th>描述</th>
            <th class="rv-th-tag">平台</th>
            <th class="rv-th-num">创建时间</th>
            <th class="rv-th-act">操作</th>
          </tr></thead>
          <tbody id="projects-list">
            <tr><td colspan="5" class="rv-empty">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Create / Edit Modal -->
<div class="rv-modal-overlay" id="project-modal">
  <div class="rv-modal-glass"></div>
  <div class="rv-modal" style="max-width:520px">
    <div class="rv-modal-header">
      <div>
        <span class="rv-modal-kicker" id="modal-kicker">新建项目</span>
        <h3 class="rv-modal-title" id="modal-title">创建新项目</h3>
      </div>
      <button class="rv-btn-icon" onclick="closeProjectModal()" aria-label="关闭">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <form id="project-form">
      <div class="rv-modal-body">
        <input type="hidden" id="project-id" value="">
        <div class="rv-form-group">
          <label class="rv-form-label">项目名称 <span class="rv-required">*</span></label>
          <input class="rv-form-input" id="project-name" required placeholder="例如：电商平台测试">
        </div>
        <div class="rv-form-group">
          <label class="rv-form-label">描述</label>
          <textarea class="rv-textarea" id="project-desc" rows="3" placeholder="项目描述..."></textarea>
        </div>
        <div class="rv-form-group">
          <label class="rv-form-label">测试平台</label>
          <select class="rv-select" id="project-platform">
            <option value="web">Web</option>
            <option value="h5">H5</option>
            <option value="ios">iOS</option>
            <option value="android">Android</option>
            <option value="miniprogram">微信小程序</option>
            <option value="api">API 接口</option>
          </select>
        </div>
      </div>
      <div class="rv-modal-footer">
        <button type="button" class="rv-btn rv-btn-outline" onclick="closeProjectModal()">取消</button>
        <button type="submit" class="rv-btn rv-btn-accent" id="modal-submit-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          创建
        </button>
      </div>
    </form>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script src="/static/js/projects.js?v=6"></script>
{% endblock %}
