{% extends "base.html" %}
{% block title %}流水线详情 - TestPlatform{% endblock %}
{% block content %}
<div class="rv-page">
  <header class="rv-header">
    <div class="rv-header-left">
      <div class="rv-header-icon-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </div>
      <div>
        <h1 class="rv-header-title" id="page-title">流水线 #---</h1>
        <p class="rv-header-sub"><a href="/projects">项目管理</a> / <span id="breadcrumb-name">加载中...</span></p>
      </div>
    </div>
    <div class="rv-toolbar-actions" id="pipeline-actions"></div>
  </header>

  <div class="rv-page-body">

    <!-- ====== 进度 + DAG ====== -->
    <div class="rv-card" style="margin-bottom:16px">
      <div class="rv-card-hd">
        <span class="rv-card-hd-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          流水线进度
        </span>
        <span class="rv-muted" style="font-size:12px" id="progress-label">加载中...</span>
      </div>
      <div class="rv-card-hd" style="border-bottom:none; padding-top:0; padding-bottom:4px">
        <div style="flex:1">
          <div class="rv-toolbar-progress-track" style="height:22px; border-radius:11px">
            <div class="rv-toolbar-progress-fill" id="dag-progress" style="width:0%; height:100%; border-radius:11px; background:var(--rv-accent-gradient); display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; font-weight:700; min-width:0"></div>
          </div>
        </div>
      </div>
      <div class="rv-card-hd" style="border-bottom:none; padding-top:0">
        <div id="dag-container" style="display:flex; flex-wrap:wrap; gap:4px; align-items:center; font-size:12px"></div>
      </div>
      <div style="padding:0 20px 12px; font-size:12px" id="pipeline-status-text"></div>
    </div>

    <!-- ====== 阶段日志 + 详情（左右布局）===== -->
    <div class="pipeline-layout">

      <!-- Left: Stage Logs -->
      <div class="pipeline-left">
        <div class="rv-card">
          <div class="rv-card-hd">
            <span class="rv-card-hd-title">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
              阶段日志
            </span>
            <span class="rv-muted" style="font-size:11px">点击查看详情</span>
          </div>
          <div class="rv-card-hd" style="border-bottom:none; padding-top:0">
            <div id="stage-logs" style="width:100%"></div>
          </div>
        </div>
      </div>

      <!-- Right: Stage Detail -->
      <div class="pipeline-right">
        <div class="rv-card" style="position:sticky; top:16px">
          <div class="rv-card-hd">
            <span class="rv-card-hd-title">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
              阶段详情
            </span>
          </div>
          <div id="stage-detail-content" style="max-height:calc(100vh - 240px); overflow-y:auto">
            <div class="rv-empty">
              <div style="margin-bottom:10px; opacity:0.6">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M19 12H5"></path>
                  <path d="M12 19l-7-7 7-7"></path>
                </svg>
              </div>
              <div>点击左侧阶段查看输出内容和状态</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/pipeline.js?v=10"></script>
{% endblock %}
